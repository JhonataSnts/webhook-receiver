services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hookrelay-app
    working_dir: /var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
    volumes:
      - ./:/var/www/html

  nginx:
    image: nginx:1.27-alpine
    container_name: hookrelay-nginx
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hookrelay-worker
    depends_on:
      - app
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --sleep=1 --timeout=90
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
    volumes:
      - ./:/var/www/html

